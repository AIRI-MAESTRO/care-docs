# Build + deploy the docs to GitHub Pages on push to `main`.
#
# This same workflow runs in BOTH repos:
#   • pyshka501/care-docs (private)      → pyshka501.github.io/care-docs   (preview)
#   • AIRI-MAESTRO/care-docs (public)    → airi-maestro.github.io/care-docs (production)
# The public copy is created by `mirror.yml`: pushing to the private `release`
# branch force-pushes a full snapshot (including this file) onto the public
# repo's `main`, which then triggers this workflow there.
#
# Prerequisites (one-time, per repo):
#   1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. astro.config.mjs sets `base: '/care-docs'` (project site) and `site` to the
#      production host (airi-maestro.github.io). For a custom domain, adjust both.
#   3. GitHub Pages on a PRIVATE repo requires GitHub Pro/Team — otherwise make
#      the repo public, or deploy to Vercel/Netlify instead.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject Yandex Metrica counter ID
        # Bakes the counter into astro.config.mjs before the build. The public
        # mirror has no secrets (mirror.yml already baked the id there), so this
        # is a no-op for it; it injects only where YANDEX_METRIKA_ID is set.
        env:
          YM_ID: ${{ secrets.YANDEX_METRIKA_ID }}
        run: |
          if [ -n "${YM_ID:-}" ]; then
            sed -i "s/__YM_COUNTER_ID__/${YM_ID}/g" astro.config.mjs
            echo "Injected Yandex Metrica counter ID into astro.config.mjs."
          else
            echo "YANDEX_METRIKA_ID secret not set — skipping (counter stays disabled)."
          fi
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
